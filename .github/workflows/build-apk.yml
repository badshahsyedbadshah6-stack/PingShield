name: Build PingShield APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PingShield-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: PingShield v1.0.${{ github.run_number }}
          body: |
            🛡️ PingShield - Live Build
            
            ✅ Auto-built from latest code
            📱 Install on any Android 11+ device
            🎮 Optimized for PUBG Mobile
            
            HOW TO INSTALL:
            1. Download PingShield.apk below
            2. On your phone: Settings → Apps → 
               Special App Access → Install Unknown Apps → Allow
            3. Open the downloaded APK and tap Install
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
